spring.application.name=settlement-service
server.port=8082
management.endpoints.web.exposure.include=health,info

# DataSource — SQL Server RDS (mesma instância do payment-service)
spring.datasource.url=${AWS_SQLSERVER_JDBC_URL}
spring.datasource.username=${AWS_SQLSERVER_USERNAME:admin}
spring.datasource.password=${AWS_SQLSERVER_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/sqlserver

# AWS
spring.cloud.aws.region.static=${AWS_REGION:us-east-2}

app.queues.settlement=${SETTLEMENT_QUEUE:payment-settlement}
