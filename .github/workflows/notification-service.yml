name: notification-service — CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend-tcs-itau-pj-notification-service/**'
      - '.github/workflows/notification-service.yml'

env:
  AWS_REGION:   us-east-2
  ECR_REPO:     pj-payment-orchestrator/notification-service
  ECS_CLUSTER:  pj-payment-orchestrator-cluster-dev
  ECS_SERVICE:  notification-service
  TASK_FAMILY:  pj-payment-orchestrator-notification-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-tcs-itau-pj-notification-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        run: |
          chmod +x mvnw
          ./mvnw verify -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: build-image
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag  $REGISTRY/$ECR_REPO:$IMAGE_TAG $REGISTRY/$ECR_REPO:latest
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "image=$REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition)

          NEW_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn,.revision,.status,
                   .requiresAttributes,.placementConstraints,
                   .compatibilities,.registeredAt,.registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Project,Values=pj-payment-orchestrator" "Name=tag:Tier,Values=public" \
            --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=pj-payment-orchestrator-ecs-tasks-sg" \
            --query 'SecurityGroups[0].GroupId' --output text)

          TG_ARN=$(aws elbv2 describe-target-groups \
            --names pjpay-dev-notif-tg \
            --query 'TargetGroups[0].TargetGroupArn' --output text)

          SERVICE_ACTIVE=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --query 'length(services[?status==`ACTIVE`])' --output text)

          if [ "$SERVICE_ACTIVE" = "1" ]; then
            aws ecs update-service \
              --cluster $ECS_CLUSTER --service $ECS_SERVICE \
              --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
              --no-cli-pager
          else
            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=$TG_ARN,containerName=notification-service,containerPort=8083" \
              --no-cli-pager
          fi

      - name: Wait for ECS stability
        run: |
          echo "Aguardando estabilização do serviço $ECS_SERVICE..."
          MAX=40
          for i in $(seq 1 $MAX); do
            SVC=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER --services $ECS_SERVICE \
              --query 'services[0].{running:runningCount,desired:desiredCount,pending:pendingCount,deployments:length(deployments)}' \
              --output json)
            RUNNING=$(echo $SVC | jq -r '.running')
            DESIRED=$(echo $SVC | jq -r '.desired')
            PENDING=$(echo $SVC | jq -r '.pending')
            DEPLOYS=$(echo $SVC | jq -r '.deployments')
            echo "[$i/$MAX] running=$RUNNING desired=$DESIRED pending=$PENDING deployments=$DEPLOYS"

            if [ "$RUNNING" = "$DESIRED" ] && [ "$PENDING" = "0" ] && [ "$DEPLOYS" = "1" ]; then
              echo "Servico estavel!"
              exit 0
            fi

            if [ $((i % 5)) -eq 0 ]; then
              echo "--- Eventos recentes ---"
              aws ecs describe-services \
                --cluster $ECS_CLUSTER --services $ECS_SERVICE \
                --query 'services[0].events[:5].[createdAt,message]' \
                --output text
            fi
            sleep 15
          done

          echo "ERRO: servico nao estabilizou em $(( MAX * 15 / 60 )) minutos"
          echo "--- Eventos finais ---"
          aws ecs describe-services \
            --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --query 'services[0].events[:10].[createdAt,message]' \
            --output text
          echo "--- Tasks paradas recentes ---"
          STOPPED=$(aws ecs list-tasks --cluster $ECS_CLUSTER \
            --service-name $ECS_SERVICE --desired-status STOPPED \
            --query 'taskArns[:3]' --output text)
          if [ -n "$STOPPED" ]; then
            aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $STOPPED \
              --query 'tasks[*].{id:taskArn,status:lastStatus,stopped:stoppedReason,container:containers[0].reason}' \
              --output json
          fi
          exit 1

      - name: Smoke test — health check
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names pjpay-dev-alb \
            --query 'LoadBalancers[0].DNSName' --output text)

          echo "ALB: $ALB_DNS"

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://$ALB_DNS:8083/health" --max-time 5 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed after 10 attempts"
          exit 1
