name: backend-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  payment-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-tcs-itau-pj-payment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run tests
        run: ./mvnw test
      - name: Sonar placeholder
        run: echo "Configure SonarQube token and project key in repository secrets."

  fraud-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fraud-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
