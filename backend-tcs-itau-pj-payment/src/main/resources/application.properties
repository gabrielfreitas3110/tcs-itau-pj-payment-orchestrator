spring.application.name=payment-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/payment_orchestrator}
spring.datasource.username=${DB_USER:payment_user}
spring.datasource.password=${DB_PASSWORD:payment_pass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0

spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}
spring.cloud.aws.endpoint=${AWS_ENDPOINT:http://localhost:4566}

app.queues.payment-created=${PAYMENT_CREATED_QUEUE:payment-created}
app.outbox.publisher-delay-ms=3000
app.security.enabled=${APP_SECURITY_ENABLED:false}
